<!DOCTYPE html>
<html>
<head>
    <title>Absolute, Fixed, Sticky</title>
    <style>

        /* 🔹 Absolute */
        .container {
            position: relative;
            width: 300px;
            height: 200px;
            border: 2px solid black;
        }

        .box {
            position: absolute;
            top: 20px;
            left: 30px;
            background: lightcoral;
            padding: 20px;
        }

        /* Badge */
        .cart {
            position: relative;
            font-size: 20px;
        }

        .badge {
            position: absolute;
            top: -10px;
            right: -15px;
            background: red;
            color: white;
            padding: 5px;
            border-radius: 50%;
        }

        /* ID Card */
        .id-card {
            position: relative;
            width: 250px;
            border: 1px solid black;
            padding: 20px;
        }

        .id-card img {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 60px;
        }

        /* Gallery */
        .gallery {
            position: relative;
            width: 200px;
        }

        .gallery img {
            width: 100%;
        }

        .label {
            position: absolute;
            top: 0;
            left: 0;
            background: yellow;
            padding: 5px;
        }

        /* Product */
        .product {
            position: relative;
            width: 200px;
            border: 1px solid black;
            padding: 20px;
        }

        .offer {
            position: absolute;
            top: 0;
            right: 0;
            background: red;
            color: white;
            padding: 5px;
        }

        /* Password icon */
        .input-box {
            position: relative;
        }

        .input-box input {
            padding-right: 30px;
        }

        .icon {
            position: absolute;
            right: 10px;
            top: 5px;
        }

        /* 🔹 Fixed */
        .contact-btn {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: blue;
            color: white;
            padding: 10px;
        }

        .fixed-header {
            position: fixed;
            top: 0;
            width: 100%;
            background: black;
            color: white;
            padding: 10px;
        }

        .whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: green;
            color: white;
            padding: 15px;
            border-radius: 50%;
        }

        .top-btn {
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: gray;
            color: white;
            padding: 10px;
        }

        /* 🔹 Sticky */
        .sticky-nav {
            position: sticky;
            top: 0;
            background: orange;
            padding: 10px;
        }

        .section {
            height: 400px;
        }

        .section h2 {
            position: sticky;
            top: 0;
            background: white;
        }

        table {
            width: 100%;
        }

        th {
            position: sticky;
            top: 0;
            background: lightgray;
        }

    </style>
</head>
<body>

<div class="fixed-header">Fixed Header</div>
<br><br>

<!-- Task 7 -->
<div class="container">
    <div class="box">Box</div>
</div>

<!-- Task 8 -->
<div class="cart">
    Cart
    <span class="badge">5</span>
</div>

<!-- Task 9 -->
<div class="id-card">
    <h3>Student</h3>
    <img src="https://via.placeholder.com/60">
</div>

<!-- Task 10 -->
<div class="gallery">
    <img src="https://via.placeholder.com/200">
    <span class="label">New</span>
</div>

<!-- Task 11 -->
<div class="product">
    Product
    <span class="offer">20% OFF</span>
</div>

<!-- Task 12 -->
<div class="input-box">
    <input type="password" placeholder="Password">
    <span class="icon">👁</span>
</div>

<!-- Task 13 -->
<button class="contact-btn">Contact Us</button>

<!-- Task 15 -->
<div class="whatsapp">💬</div>

<!-- Task 16 -->
<button class="top-btn">Top</button>

<!-- Task 17 -->
<div class="sticky-nav">Sticky Navbar</div>

<!-- Task 18 -->
<div class="section"><h2>Section 1</h2></div>
<div class="section"><h2>Section 2</h2></div>
<div class="section"><h2>Section 3</h2></div>

<!-- Task 19 -->
<table border="1">
    <tr>
        <th>Name</th>
        <th>Marks</th>
    </tr>
    <tr><td>A</td><td>90</td></tr>
    <tr><td>B</td><td>85</td></tr>
    <tr><td>C</td><td>80</td></tr>
    <tr><td>D</td><td>75</td></tr>
    <tr><td>E</td><td>70</td></tr>
    <tr><td>F</td><td>65</td></tr>
</table>

</body>
</html>
