<!DOCTYPE html>
<html>
<head>
    <title>CSS Tasks</title>

    <style>
        /* Task 6 */
        h1 {
            color: red;
        }

        p {
            color: blue;
        }

        .para {
            font-size: 18px;
            font-family: Arial;
        }

        /* Task 8 */
        h2 {
            color: green;
        }

        /* Task 9 */
        form {
            background-color: lightgray;
            padding: 20px;
        }

        input {
            width: 300px;
            margin: 5px;
        }

        /* Task 10 */
        table {
            border: 1px solid black;
            background-color: lightblue;
        }

        td, th {
            padding: 10px;
            border: 1px solid black;
        }

        /* Task 17 */
        .highlight {
            background-color: yellow;
            color: black;
        }

        /* Task 18 */
        .card {
            border: 1px solid black;
            padding: 15px;
            box-shadow: 2px 2px 5px gray;
            margin: 10px;
        }

        /* Task 19 */
        #title {
            color: darkblue;
            text-align: center;
        }

        /* Task 20 */
        #main-title {
            text-align: center;
        }

        .content {
            color: blue;
        }

        button {
            background-color: green;
            color: white;
        }
    </style>

</head>
<body>

<!-- 🔹 Part 1: Inline CSS -->

<h1 style="color: blue;">Welcome to CSS</h1>

<p style="font-size: 20px; color: green;">
    Inline styled paragraph
</p>

<button style="background-color: orange; color: white;">
    Click Me
</button>

<h2 style="color: red;">Heading 1</h2>
<h2 style="color: green;">Heading 2</h2>
<h2 style="color: purple;">Heading 3</h2>

<table style="background-color: yellow; text-align: center;" border="1">
    <tr>
        <th>Name</th>
        <th>Age</th>
    </tr>
    <tr>
        <td>Raju</td>
        <td>21</td>
    </tr>
</table>

<hr>

<!-- 🔹 Part 2: Internal CSS -->

<h1>Internal CSS Heading</h1>

<p class="para">Paragraph 1</p>
<p class="para">Paragraph 2</p>
<p class="para">Paragraph 3</p>

<h2>Sub Heading</h2>

<form>
    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>
</form>

<table>
    <tr>
        <th>Name</th>
        <th>Marks</th>
    </tr>
    <tr>
        <td>Raju</td>
        <td>90</td>
    </tr>
</table>

<hr>

<!-- 🔹 Part 4: Selectors -->

<h1 id="title">Main Heading</h1>

<p class="highlight">Highlighted paragraph</p>

<div class="card">Card 1</div>
<div class="card">Card 2</div>
<div class="card">Card 3</div>

<h1 id="main-title">Website Title</h1>
<p class="content">This is content text</p>

<button>Click Me</button>

</body>
</html>
